---
# MERFISHeyes visualization microservice.
# Mounts under /merfisheyes/* (see basePath in next.config.js).
# Merge the /merfisheyes rule into your existing ADMAP Ingress — do NOT
# create a second Ingress for the same host, and do NOT add a path rewrite.
# CORS is configured on MinIO/LakeFS, not here. See docs/admap-deployment.md.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: merfisheyes
  labels:
    app: merfisheyes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: merfisheyes
  template:
    metadata:
      labels:
        app: merfisheyes
    spec:
      containers:
        - name: merfisheyes
          image: # REPLACE_ME/merfisheyes:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /merfisheyes/viewer
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /merfisheyes/viewer
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: merfisheyes
  labels:
    app: merfisheyes
spec:
  type: ClusterIP
  selector:
    app: merfisheyes
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Ingress rule to merge into the existing ADMAP Ingress:
#
#   - path: /merfisheyes
#     pathType: Prefix
#     backend:
#       service:
#         name: merfisheyes
#         port:
#           number: 80
